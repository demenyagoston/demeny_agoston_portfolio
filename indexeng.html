<body>

        </div>
    </header>

    <main class="center_keres">
        <div class="center_box" id="heroBox">
            <div class="index_szoveg">Demény Ágoston</div>
            <div class="index_szoveg2">Portfolio</div>
        </div>
    </main>

    <section class="frt_bemutato">

    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const heroBox = document.getElementById("heroBox");
            const header = document.querySelector("header");
            const headerHeight = header ? header.offsetHeight : 0;

            const maxScroll = 500;   // ennyi scroll után érjen teljesen balra
            const minScale = 0.6;    // minimum zsugorítás
            const marginLeft = 20;   // px távolság a bal széltől

            // fixáljuk a heroBox-ot
            heroBox.style.position = "fixed";
            heroBox.style.top = headerHeight + 165 + "px";
            heroBox.style.zIndex = "1000";

            window.addEventListener("scroll", () => {
                let progress = window.scrollY / maxScroll;
                if (progress > 1) progress = 1;

                // kiinduló X: középre igazítva
                const startX = (window.innerWidth - heroBox.offsetWidth) / 2;
                // végső X: bal szélhez igazítva
                const endX = marginLeft;

                // lineáris interpoláció
                const currentX = startX + (endX - startX) * progress;

                // méret skálázás
                const scale = 1 - progress * (1 - minScale);

                heroBox.style.left = currentX + "px";
                heroBox.style.transform = `scale(${scale})`;
            });
        });
    </script>

</body>
</html>
